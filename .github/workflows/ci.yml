name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck

  test-pixel:
    name: Test apps/pixel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @testa-platform/pixel test
      - run: pnpm --filter @testa-platform/pixel build
      - run: pnpm --filter @testa-platform/pixel check:size

  test-edge:
    name: Test apps/edge
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @testa-platform/edge test

  test-collector:
    name: Test apps/collector
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7.4-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping" --health-interval 5s --health-timeout 3s --health-retries 10
      clickhouse:
        image: clickhouse/clickhouse-server:24.10-alpine
        ports: ['8123:8123', '9000:9000']
        options: >-
          --health-cmd "wget --quiet --spider http://localhost:8123/ping" --health-interval 5s --health-timeout 3s --health-retries 20
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 9.12.0 }
      - uses: actions/setup-node@v4
        with: { node-version: '22', cache: 'pnpm' }
      - uses: oven-sh/setup-bun@v2
        with: { bun-version: latest }
      - run: pnpm install --frozen-lockfile
      - name: Apply CH migrations
        run: pnpm --filter @testa-platform/collector migrate
        env:
          CLICKHOUSE_URL: http://localhost:8123
      - run: pnpm --filter @testa-platform/collector test
        env:
          REDIS_URL: redis://localhost:6379
          CLICKHOUSE_URL: http://localhost:8123
