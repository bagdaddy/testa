<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Promo — testa demo</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      * { box-sizing: border-box; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        margin: 0;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .container {
        text-align: center;
        padding: 2rem;
      }
      h1 { font-size: 4rem; margin: 0 0 1rem; }
      p { font-size: 1.5rem; opacity: 0.9; }
      .badge {
        display: inline-block;
        padding: 0.5rem 1rem;
        background: rgba(255,255,255,0.2);
        border-radius: 999px;
        font-size: 0.9rem;
        margin-top: 2rem;
      }
      .debug {
        margin-top: 2rem;
        padding: 1.5rem;
        background: rgba(0,0,0,0.3);
        border-radius: 8px;
        font-family: ui-monospace, monospace;
        font-size: 0.8rem;
        text-align: left;
        max-width: 600px;
        margin-inline: auto;
      }
      .debug pre { white-space: pre-wrap; word-break: break-all; margin: 0; }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>You got the promo!</h1>
      <p>The redirect variation fired and brought you here.</p>
      <div class="badge">variation_id = 202</div>

      <div class="debug">
        <pre id="snap">(waiting…)</pre>
      </div>
    </div>

    <script>
      window.cfPrefill = window.__DEMO_CFPREFILL__;
    </script>
    <script src="/dist/loader.min.js"></script>
    <script src="/dist/runtime.min.js"></script>

    <script>
      function refreshDebug() {
        const snap = window._testa?.debug?.();
        document.getElementById('snap').textContent = snap
          ? JSON.stringify(snap, null, 2)
          : '(not hydrated)';
      }
      setTimeout(refreshDebug, 100);
      setInterval(refreshDebug, 2000);
    </script>
  </body>
</html>
