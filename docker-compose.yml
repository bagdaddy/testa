# Local development backing services for testa-platform.
# Production hosting is out of scope — this is for `bun run dev` workflows.

services:
  redis:
    image: redis:7.4-alpine
    container_name: tp-redis
    ports:
      # Host 6380 → container 6379 to avoid clashing with other local Redis instances.
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - redis-data:/data
    command: ["redis-server", "--appendonly", "yes"]
    restart: unless-stopped

  clickhouse:
    # Single-node ZooKeeper-less ClickHouse. Sufficient for dev and v1
    # (per the architecture plan; replication / HA is explicitly out of scope).
    image: clickhouse/clickhouse-server:24.10-alpine
    container_name: tp-clickhouse
    ports:
      - "8123:8123"   # HTTP interface (used by @clickhouse/client)
      - "9000:9000"   # native TCP
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    environment:
      CLICKHOUSE_DB: default
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: ""
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--spider", "http://localhost:8123/ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - clickhouse-data:/var/lib/clickhouse
      - clickhouse-logs:/var/log/clickhouse-server
    restart: unless-stopped

volumes:
  redis-data:
  clickhouse-data:
  clickhouse-logs:
